<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الخدمات البنكية الذكية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    background:linear-gradient(135deg,#111827,#1f2937,#312e81);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:460px;
    margin:auto;
}

.header{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:30px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#8b5cf6,#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    color:white;
    box-shadow:0 0 25px rgba(124,58,237,0.6);
}

.header h1{
    color:white;
    margin-top:18px;
    font-size:34px;
    font-weight:900;
}

.header p{
    color:#d1d5db;
    margin-top:10px;
    font-size:17px;
}

.card{
    margin-top:22px;
    background:white;
    border-radius:30px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.section-title{
    font-size:22px;
    font-weight:900;
    margin-bottom:18px;
    color:#111827;
}

.wallets{
    display:flex;
    gap:12px;
    margin-bottom:25px;
}

.wallet{
    flex:1;
    background:#f9fafb;
    border:2px solid #e5e7eb;
    border-radius:22px;
    padding:18px 10px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.wallet:hover{
    transform:translateY(-4px);
}

.wallet.active{
    background:linear-gradient(135deg,#8b5cf6,#7c3aed);
    color:white;
    border-color:#7c3aed;
    box-shadow:0 8px 20px rgba(124,58,237,0.4);
}

.wallet .icon{
    font-size:32px;
    margin-bottom:8px;
}

.wallet .name{
    font-size:17px;
    font-weight:700;
}

label{
    display:block;
    margin-bottom:10px;
    font-size:18px;
    font-weight:700;
    color:#111827;
}

input{
    width:100%;
    height:62px;
    border-radius:18px;
    border:2px solid #e5e7eb;
    padding:15px;
    font-size:24px;
    margin-bottom:20px;
    text-align:center;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#7c3aed;
    box-shadow:0 0 15px rgba(124,58,237,0.2);
}

button{
    width:100%;
    height:68px;
    border:none;
    border-radius:22px;
    background:linear-gradient(135deg,#8b5cf6,#7c3aed);
    color:white;
    font-size:23px;
    font-weight:900;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(124,58,237,0.35);
}

button:hover{
    transform:scale(1.02);
}

.note{
    margin-top:16px;
    text-align:center;
    color:#6b7280;
    font-size:15px;
}

.footer{
    margin-top:28px;
    text-align:center;
    padding:20px;
    border-radius:24px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
}

.footer span{
    display:block;
    color:#ffffff;
    font-size:24px;
    font-weight:900;
    letter-spacing:1px;
    text-shadow:0 0 15px rgba(255,255,255,0.3);
}

.footer small{
    display:block;
    margin-top:8px;
    color:#d1d5db;
    font-size:15px;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <div class="logo">
            💳
        </div>

        <h1>الخدمات البنكية الذكية</h1>

        <p>
            تنفيذ سريع وآمن للخدمات البنكية والمحافظ الإلكترونية
        </p>

    </div>

    <div class="card">

        <div class="section-title">
            اختر الخدمة
        </div>

        <div class="wallets">

            <div class="wallet active" onclick="selectWallet('palpay',this)">

                <div class="icon">💜</div>

                <div class="name">
                    بال باي
                </div>

            </div>

            <div class="wallet" onclick="selectWallet('bank',this)">

                <div class="icon">🏦</div>

                <div class="name">
                    بنك فلسطين
                </div>

            </div>

            <div class="wallet" onclick="selectWallet('jawwal',this)">

                <div class="icon">📱</div>

                <div class="name">
                    جوال بي
                </div>

            </div>

        </div>

        <div id="inputsArea">

            <label>
                رقم المستلم
            </label>

            <input type="tel" id="phone" placeholder="">

            <label>
                المبلغ (شيكل)
            </label>

            <input type="number" id="amount" placeholder="">

        </div>

        <button onclick="generateUSSD()">
            إنشاء الكود والاتصال 📞
        </button>

        <div class="note">
            سيتم فتح تطبيق الهاتف تلقائياً لإجراء العملية
        </div>

    </div>

    <div class="footer">

        <span>
            تصميم وبرمجة
            <br>
            م/ باسل ياسر اللوح
        </span>

        <small>
            جميع الحقوق محفوظة ©
        </small>

    </div>

</div>

<script>

let currentWallet = 'palpay';

function selectWallet(type,element){

    currentWallet = type;

    let wallets = document.querySelectorAll('.wallet');

    wallets.forEach(w => w.classList.remove('active'));

    element.classList.add('active');

    let inputsArea = document.getElementById('inputsArea');

    if(type === 'bank' || type === 'jawwal'){

        inputsArea.style.display = 'none';

    }else{

        inputsArea.style.display = 'block';
    }
}

function generateUSSD(){

    let ussd = '';

    if(currentWallet === 'palpay'){

        let phone = document.getElementById('phone').value;
        let amount = document.getElementById('amount').value;

        if(phone === '' || amount === ''){

            alert('يرجى تعبئة جميع الحقول');

            return;
        }

        ussd = `*370*1*1*${phone}*${amount}#`;
    }

    else if(currentWallet === 'bank'){

        ussd = '*267#';
    }

    else if(currentWallet === 'jawwal'){

        ussd = '*110#';
    }

    window.location.href = `tel:${encodeURIComponent(ussd)}`;
}

</script>

</body>
</html>
